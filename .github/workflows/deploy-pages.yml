name: Deploy City Limits Mobile Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "src/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Web Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pygame-ce>=2.5,<2.6" "pygbag==0.9.3"

      - name: Build Browser Game
        run: |
          python -m pygbag \
            --build \
            --ume_block 0 \
            --width 800 \
            --height 600 \
            --title "City Limits" \
            src/main.py

      - name: Patch Mobile HTML Shell
        run: |
          python tools/patch_pygbag_html.py src/build/web/index.html --width 800 --height 600

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
